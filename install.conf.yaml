- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.bashrc: bashrc
    ~/.bash_logout: bash_logout
    ~/.gitconfig: gitconfig
    ~/.profile: profile
    ~/.profile_shared: profile_shared
    ~/.ssh/config:
        path: ssh/config
        create: true
        if: '[ ! -e ~/.ssh/config ] || [ -L ~/.ssh/config ]'
    ~/.tmux.conf: tmux.conf
    ~/.zshrc: zshrc
    ~/Library/Application Support/iTerm2/DynamicProfiles/monte-profile.json:
        path: iterm2/monte-profile.json
        create: true

- shell:
  - [git submodule update --init --recursive, Installing submodules]
